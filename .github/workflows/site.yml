name: Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch the host-lifecycle tool
        # Only the publisher submodule; allium/specula are not needed to build docs.
        run: git submodule update --init tools/host-lifecycle
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the publisher
        run: cargo build --release --manifest-path tools/host-lifecycle/Cargo.toml
      - name: Generate the book (lifecycle order; every room)
        # `book` writes book.toml (src = "mdBook/src", build-dir = "mdBook/out"); `--check` fails the build
        # unless every room with source renders a page (call/0005-safe: it reads the
        # committed .host-software, never the un-materialized worktrees).
        run: |
          HL=tools/host-lifecycle/target/release/host-lifecycle
          "$HL" book .
          "$HL" book --check .
      - name: Build site
        run: mdbook build
      - name: Assert the built layout
        run: test -f mdBook/out/index.html
      - name: Resolve the book mount
        id: mount
        # A non-default `book-mount` publishes the book under a sub-path and keeps the
        # surrounding site; the root default replaces the whole site. The tool owns the
        # normalisation, so the workflow reads the value rather than parsing the stamp.
        run: |
          HL=tools/host-lifecycle/target/release/host-lifecycle
          MOUNT="$("$HL" book --print-mount .)"
          if [ "$MOUNT" = "/" ]; then
            echo "dir=" >> "$GITHUB_OUTPUT"
            echo "keep=false" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${MOUNT#/}" >> "$GITHUB_OUTPUT"
            echo "keep=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mdBook/out
          destination_dir: ${{ steps.mount.outputs.dir }}
          keep_files: ${{ steps.mount.outputs.keep }}
