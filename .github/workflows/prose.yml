name: Prose

# The spine obeys the prose rule it publishes (plan/0038): authored markdown carries
# zero prose tropes. `host-lifecycle prose .` is host-lint's `--docs` engine run
# in-process; it scans this repo's own tracked markdown (submodule files are gitlinks,
# not walked) and exits non-zero on any flag or warning.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the same host-lifecycle the host gates on (v0.24.2), so the spine's
      # verdict matches every adopter's verify-phase prose audit.
      - name: Install host-lifecycle (pinned)
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev 9a1a5869c62a2dc549f4ac7ef5b1d6294f25d06c --root "$HOME/.local"
      - name: Prose gate (zero tropes in authored docs)
        run: "$HOME/.local/bin/host-lifecycle prose ."
